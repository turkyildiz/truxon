# LEGACY — self-hosted stack for the original FastAPI architecture.
# Current architecture is Supabase-native (see README.md); kept for reference.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: truckson
      POSTGRES_USER: truckson
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truckson"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      TRUCKSON_DATABASE_URL: postgresql+psycopg://truckson:${DB_PASSWORD}@db:5432/truckson
      TRUCKSON_SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      TRUCKSON_ENVIRONMENT: production
      TRUCKSON_UPLOAD_DIR: /data/uploads
      TRUCKSON_GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      TRUCKSON_LLM_API_KEY: ${LLM_API_KEY:-}
      TRUCKSON_LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      TRUCKSON_LLM_MODEL: ${LLM_MODEL:-meta-llama/llama-3.1-8b-instruct}
      TRUCKSON_INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-admin}
      TRUCKSON_CORS_ORIGINS: '["http://localhost:8080"]'
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
