name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Typecheck and build
        working-directory: frontend
        run: npm run build

  # Static security + workflow source checks (no Supabase runtime required).
  # continue-on-error: remove once B1/B2/B6/B11/C6 are fixed (see docs/TESTING.md).
  security-static:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run static security harness
        run: |
          chmod +x scripts/run-truxon-tests.sh
          ./scripts/run-truxon-tests.sh static-security | tee security-static.log
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-static-log
          path: security-static.log

  # Legacy FastAPI implementation (backend/) — kept green until removed.
  backend-legacy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run API smoke tests
        working-directory: backend
        run: python smoke_test.py
