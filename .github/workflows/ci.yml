name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Secret scan (fail the build if a real credential lands in git). The decoy
  # honeypot keys and the public anon JWT are allowlisted in .gitleaks.toml.
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Typecheck and build
        working-directory: frontend
        run: npm run build

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Analyze
        working-directory: mobile
        run: flutter analyze
      - name: Test
        working-directory: mobile
        run: flutter test

  # Applies every migration to a fresh Postgres, then runs the pgTAP suite in
  # supabase/tests/ — a broken migration or workflow/invoice regression fails
  # here instead of during `supabase db push` against production.
  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Apply migrations to a fresh database
        run: supabase db start
      - name: Run pgTAP tests
        run: supabase test db

  # Edge-function unit tests (pure logic in _shared/*.test.ts — FMCSA
  # verification gate, Denim reconcile). No secrets, no network.
  edge-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Run deno tests
        run: deno test --quiet supabase/functions/_shared/
