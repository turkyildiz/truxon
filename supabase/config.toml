# Supabase project configuration (used by the CLI).
project_id = "truxon"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]

[db]
port = 54322
major_version = 17

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
# Staff accounts are created by admins via the admin-users edge function;
# public self-signup stays off.
enable_signup = false
# Required for password login (GoTrue GOTRUE_EXTERNAL_EMAIL_ENABLED).
# Without this, admin-created users cannot signInWithPassword.
enable_manual_linking = false

[auth.email]
# Keep public email signup off at [auth] level; enable the email *provider*
# so existing (admin-created) accounts can log in with email+password.
enable_signup = true
enable_confirmations = false

[functions.extract-pdf]
verify_jwt = true

[functions.distance]
verify_jwt = true

[functions.admin-users]
verify_jwt = true

[functions.notify]
# JWT verified in-function for register; webhook uses shared secret
verify_jwt = false

[functions.trux-agent]
verify_jwt = true
